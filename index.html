<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>图像侵权风险比对工具</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="site-shell landing-shell">
    <header class="hero hero-compact">
      <p class="eyebrow">Image IP Risk Tool</p>
      <h1>图像侵权风险比对工具</h1>
      <p class="hero-copy">
        这是独立的线上简化版，仅做“设计图 vs 指定对比图”分析，不包含高风险图库和管理端。
      </p>
    </header>

    <main class="landing-grid">
      <a class="entry-card" href="/check.html">
        <span class="entry-tag">线上版本</span>
        <h2>进入比对分析</h2>
        <p>上传设计图和指定对比图，系统输出风险等级、规则依据、风险点和修改建议。</p>
        <strong>开始使用</strong>
      </a>
    </main>

    <section class="panel info-panel">
      <h3>版本说明</h3>
      <ul class="text-list">
        <li>本版本不连接高风险图库，不提供图库管理功能。</li>
        <li>分析仅基于设计图与指定对比图之间的相似度和规则判断。</li>
        <li>适合部署到 Vercel 独立运行。</li>
      </ul>
    </section>
  </div>
</body>
</html>
